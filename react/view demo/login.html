<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Code Arena</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: 'rgba(30, 41, 59, 0.7)',
                        primary: '#3b82f6',
                        accent: '#10b981'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Glow -->
    <div
        class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/20 blur-[120px] rounded-full pointer-events-none">
    </div>
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-purple-600/20 blur-[120px] rounded-full pointer-events-none">
    </div>

    <div class="glass p-10 rounded-3xl w-full max-w-md relative z-10 shadow-2xl shadow-blue-900/20">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 text-3xl font-bold tracking-tighter mb-2">
                <i class="ph-fill ph-code text-blue-500 text-4xl"></i>
                <span class="text-white">Code<span class="text-blue-500">Arena</span></span>
            </a>
            <p class="text-slate-400">Đăng nhập vào hệ thống</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Tên đăng nhập / Account</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-user text-slate-400 text-lg"></i>
                    </div>
                    <input type="text" id="username" required
                        class="w-full bg-[#1e293b] border border-[#334155] text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block pl-10 p-3 outline-none transition-colors"
                        placeholder="admin / moderator / user">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-slate-300">Mật khẩu / Password</label>
                    <a href="forgot_password.html"
                        class="text-sm font-medium text-blue-400 hover:text-blue-300 transition-colors">Quên mật
                        khẩu?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-lock-key text-slate-400 text-lg"></i>
                    </div>
                    <input type="password" id="password" required
                        class="w-full bg-[#1e293b] border border-[#334155] text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block pl-10 p-3 outline-none transition-colors"
                        placeholder="Nhập 123">
                </div>
            </div>

            <div id="errorMessage"
                class="hidden text-red-400 text-sm text-center bg-red-400/10 py-2 rounded-lg border border-red-500/20">
                Tài khoản hoặc mật khẩu không chính xác!
            </div>

            <button type="submit"
                class="w-full text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg px-5 py-3 text-center transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                Đăng Nhập <i class="ph-bold ph-sign-in"></i>
            </button>

            <!-- Social Login -->
            <div class="relative flex items-center gap-4 py-2 mt-2">
                <div class="flex-1 border-t border-slate-700"></div>
                <div class="text-xs text-slate-400 font-medium whitespace-nowrap">HOẶC ĐĂNG NHẬP VỚI</div>
                <div class="flex-1 border-t border-slate-700"></div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-2">
                <button type="button" onclick="alert('Tính năng đăng nhập Google đang được phát triển!')"
                    class="flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800/50 hover:bg-slate-700 border border-slate-700 rounded-lg text-white font-medium transition-colors">
                    <i class="ph-fill ph-google-logo text-xl text-red-500"></i> Google
                </button>
                <button type="button" onclick="alert('Tính năng đăng nhập GitHub đang được phát triển!')"
                    class="flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800/50 hover:bg-slate-700 border border-slate-700 rounded-lg text-white font-medium transition-colors">
                    <i class="ph-fill ph-github-logo text-xl"></i> GitHub
                </button>
            </div>

            <div class="mt-6 text-center text-sm font-medium text-slate-300">
                Chưa có tài khoản Code Arena?
                <a href="register.html" class="text-blue-400 hover:text-blue-300 transition-colors hover:underline">Đăng
                    ký ngay</a>
            </div>

            <div class="text-center text-sm text-slate-400 mt-4">
                <p>Tài khoản Test:</p>
                <div class="flex justify-center gap-4 mt-2 font-mono">
                    <span>admin:123</span>
                    <span>moderator:123</span>
                    <span>user:123</span>
                </div>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            if (pass !== '123') {
                errorMsg.classList.remove('hidden');
                return;
            }

            let role = '';
            let targetUrl = '';

            if (user === 'admin') {
                role = 'Admin';
                targetUrl = 'admin/dashboard.html';
            } else if (user === 'moderator') {
                role = 'Moderator';
                targetUrl = 'moderator/dashboard.html';
            } else if (user === 'user') {
                role = 'User';
                targetUrl = 'user/home.html';
            } else {
                errorMsg.classList.remove('hidden');
                return;
            }

            // Lưu thông tin đăng nhập vào localStorage
            localStorage.setItem('codeArenaUser', JSON.stringify({
                username: user,
                role: role
            }));

            // Chuyển trang
            window.location.href = targetUrl;
        });
    </script>
</body>

</html>
