<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Code Arena</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: 'rgba(30, 41, 59, 0.7)',
                        primary: '#3b82f6',
                        accent: '#10b981'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body class="antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Background Glow -->
    <div
        class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/20 blur-[120px] rounded-full pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-purple-600/20 blur-[120px] rounded-full pointer-events-none">
    </div>

    <div class="glass p-10 rounded-3xl w-full max-w-md relative z-10 shadow-2xl shadow-blue-900/20">
        <div class="text-center mb-8">
            <a href="index.html"
                class="inline-flex items-center gap-2 text-3xl font-bold tracking-tighter mb-2 hover:opacity-80 transition-opacity">
                <i class="ph-fill ph-code text-blue-500 text-4xl"></i>
                <span class="text-white">Code<span class="text-blue-500">Arena</span></span>
            </a>
            <h2 class="text-xl font-semibold mt-2">Lấy lại mật khẩu</h2>
            <p class="text-slate-400 text-sm mt-1">Nhập email đăng ký để nhận link đặt lại mật khẩu</p>
        </div>

        <form id="forgotPasswordForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email của bạn</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph-duotone ph-envelope text-slate-400 text-lg"></i>
                    </div>
                    <input type="email" required
                        class="w-full bg-[#1e293b] border border-[#334155] text-white text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block pl-10 p-3 outline-none transition-colors"
                        placeholder="name@company.com">
                </div>
            </div>

            <button type="submit"
                class="w-full text-white bg-blue-600 hover:bg-blue-500 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg px-5 py-3 text-center transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                Gửi Link Khôi Phục <i class="ph-bold ph-paper-plane-right"></i>
            </button>

            <div class="mt-6 text-center text-sm font-medium text-slate-300">
                <a href="login.html"
                    class="text-slate-400 flex items-center justify-center gap-2 hover:text-white transition-colors hover:underline">
                    <i class="ph-bold ph-arrow-left"></i> Quay lại Đăng nhập
                </a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Một liên kết khôi phục mật khẩu đã được gửi đến email của bạn!');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
